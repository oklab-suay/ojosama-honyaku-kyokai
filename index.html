<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お嬢様言葉翻訳協会</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap');

  :root {
    --wine:    #4A1028;
    --wine-mid:#6B1F3E;
    --wine-lt: #8B3A5A;
    --gold:    #B8974A;
    --gold-lt: #D4B06A;
    --cream:   #F5EFE6;
    --cream-dk:#EDE3D5;
    --marble:  #F9F5F0;
    --ink:     #2A1520;
    --ink-soft:#5C3D50;
    --border:  rgba(184,151,74,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--marble);
    color: var(--ink);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* 大理石テクスチャ風背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(74,16,40,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(184,151,74,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(74,16,40,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* 細い装飾ライン */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--wine), var(--gold), var(--wine-mid), var(--gold-lt), var(--wine));
    z-index: 100;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ヘッダー */
  header {
    text-align: center;
    padding: 52px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 44px;
  }

  .brand-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: block;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 300;
    font-style: italic;
    color: var(--wine);
    line-height: 1.2;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
  }

  .tagline {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    font-weight: 300;
  }

  /* 仕切り装飾 */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 32px;
    max-width: 240px;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* セクションラベル */
  .section-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  /* レベル選択 */
  .level-section {
    margin-bottom: 32px;
  }

  .level-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .level-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    font-family: 'Noto Serif JP', serif;
  }

  .level-btn:hover {
    border-color: var(--gold);
    background: rgba(184,151,74,0.06);
  }

  .level-btn.active {
    background: var(--wine);
    border-color: var(--wine);
    color: var(--cream);
  }

  .level-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--gold);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .level-btn.active .level-num { color: var(--gold-lt); }

  .level-name {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    display: block;
  }
  .level-btn.active .level-name { color: var(--cream-dk); }

  /* 入力エリア */
  .input-section {
    margin-bottom: 28px;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 18px 20px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.8;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--wine-lt);
    box-shadow: 0 0 0 3px rgba(74,16,40,0.06);
  }

  textarea::placeholder {
    color: #C4B0BA;
    font-style: italic;
  }

  /* 変換ボタン */
  .convert-btn {
    display: block;
    width: 100%;
    margin-top: 14px;
    padding: 16px;
    background: linear-gradient(135deg, var(--wine) 0%, var(--wine-mid) 100%);
    border: none;
    border-radius: 2px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .convert-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    transition: left 0.4s ease;
  }

  .convert-btn:hover::before { left: 100%; }
  .convert-btn:hover { opacity: 0.92; }
  .convert-btn:active { transform: scale(0.99); }

  /* 出力エリア */
  .output-section {
    display: none;
  }

  .output-section.visible {
    display: block;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 比較表示 */
  .compare-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  @media (max-width: 500px) {
    .compare-wrap {
      grid-template-columns: 1fr;
    }
  }

  .compare-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 18px;
  }

  .compare-box.result {
    background: linear-gradient(160deg, #fff8f4 0%, #fff 100%);
    border-color: rgba(184,151,74,0.5);
    position: relative;
  }

  .compare-box.result::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--wine), var(--gold));
  }

  .compare-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
    display: block;
  }
  .compare-box.result .compare-label {
    color: var(--gold);
  }

  .compare-text {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.9;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* コピーボタン */
  .copy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 2px;
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .copy-btn:hover {
    background: var(--gold);
    color: white;
  }

  .copy-btn.copied {
    background: var(--wine);
    border-color: var(--wine);
    color: white;
  }

  .copy-icon {
    width: 14px; height: 14px;
    fill: currentColor;
  }

.chairman-section {
  margin: 56px 0 36px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  text-align: center;
}

.chairman-title {
  font-size: 12px;
  letter-spacing: 0.3em;
  color: var(--gold);
  margin-bottom: 18px;
}

.chairman-text {
  font-size: 13px;
  line-height: 2;
  color: var(--ink-soft);
  margin-bottom: 18px;
}

.chairman-links {
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
}

.chairman-links a {
  color: var(--wine);
  text-decoration: none;
  border-bottom: 1px solid var(--gold);
  transition: all 0.2s ease;
}

.chairman-links a:hover {
  color: var(--gold);
}

  /* フッター */
  footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .footer-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--gold);
    opacity: 0.6;
  }

  /* ローディング */
  .loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.1em;
  }
  .loading.visible { display: block; }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
</style>
</head>

      </svg>
      コピーしてSNSへ
    </button>
  </div>

<section class="chairman-section">

  <p class="chairman-text">

  <p class="chairman-links">

  </p>
</section>


  <footer>
    <p class="footer-ornament">— Parole di Dama —</p>
  </footer>

</div>

  'GASのWebアプリURL';

async function checkMaintenance() {
  try {
    const res = await fetch(LOG_ENDPOINT);
    const data = await res.json();

    return data.isMaintenance === true;

  } catch (e) {
    console.error('利用回数チェック失敗', e);
    return false;
  }
}

// ===== ログ送信設定 =====
const LOG_ENDPOINT =
  'https://script.google.com/macros/s/AKfycbzNTsvMJAuQ6QKtPBEJlKTvczcCwm6zb7PA1HC0lJ2oCH7R4lRkWyJnTLPCi9y58Bo/exec';

async function sendLog(beforeText, afterText, level) {
  try {
    fetch(LOG_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        timestamp: new Date().toISOString(),
        beforeText,
        afterText,
        level
      })
    });
  } catch (e) {
    console.error('ログ送信失敗', e);
  }
}

function selectLevel(n) {
  currentLevel = n;
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.level) === n);
  });
}

async function applyConversion(text, level) {
  const res = await fetch('/.netlify/functions/convert', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, level }),
  });
  if (!res.ok) {
    throw new Error('変換に失敗しましたわ');
  }
  const data = await res.json();
  return data.result;
}

function getSeasonalPhrase(level) {
  // レベル1は季節フレーズなし、レベル2以上で追加
  if (level < 2) return '';
  const month = new Date().getMonth() + 1;
  const phrases = seasonalPhrases[month] || seasonalPhrases[6];
  // レベルが高いほど豊かなフレーズを（インデックスをレベルで選ぶ）
  const idx = Math.min(level - 2, phrases.length - 1);
  // 同じレベルの中でも少しランダム性を持たせる
  const roll = Math.random();
  const chosen = roll < 0.5 ? phrases[idx] : phrases[Math.floor(Math.random() * phrases.length)];
  return '\n' + chosen;
}
